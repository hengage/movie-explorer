<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Movie Explorer | Favorites</title>
    <meta
      name="description"
      content="View the movies you saved to your Movie Explorer favorites list."
    />
    <link rel="stylesheet" href="/src/css/styles.css" />
    <script type="module" src="/src/js/favorites.js"></script>
  </head>
  <body>
    <div class="min-h-screen bg-cinema-bg text-cinema-text">
      <header class="border-b border-white/10 bg-black/30 backdrop-blur-sm">
        <div class="mx-auto flex max-w-7xl items-center justify-between gap-4 px-6 py-4">
          <a href="/index.html" class="font-display text-3xl uppercase tracking-[0.2em] text-cinema-accent">
            Movie Explorer
          </a>
          <nav class="flex items-center gap-4 text-sm font-medium text-cinema-muted">
            <a href="/search/index.html" class="transition hover:text-cinema-text">Search</a>
            <a href="/favorites/index.html" class="transition hover:text-cinema-text">Favorites</a>
          </nav>
        </div>
      </header>

      <main class="page-shell py-10">
        <div class="flex flex-col gap-4 border-b border-white/10 pb-6 sm:flex-row sm:items-end sm:justify-between">
          <div>
            <p class="section-kicker">Saved for later</p>
            <h1 class="section-heading">Favorites</h1>
            <p class="mt-2 text-cinema-muted">
              Keep track of the titles you want to come back to.
            </p>
          </div>
        </div>
        <div id="favorites-results" class="mt-8"></div>
      </main>
    </div>
  </body>
</html>
