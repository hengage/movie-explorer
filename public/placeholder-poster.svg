<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 900" role="img" aria-labelledby="title desc">
  <title id="title">Movie placeholder poster</title>
  <desc id="desc">A fallback poster for movies without artwork.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#181c24" />
      <stop offset="100%" stop-color="#202531" />
    </linearGradient>
  </defs>
  <rect width="600" height="900" fill="url(#bg)" />
  <g fill="none" stroke="#d4a24c" stroke-width="16" opacity="0.7">
    <rect x="90" y="120" width="420" height="660" rx="28" />
    <path d="M160 260h280M160 340h280M160 420h180" />
  </g>
  <circle cx="300" cy="600" r="78" fill="#d4a24c" opacity="0.18" />
  <text x="50%" y="69%" text-anchor="middle" fill="#f4f7fb" font-family="Arial, sans-serif" font-size="34" letter-spacing="8">
    MOVIE EXPLORER
  </text>
</svg>
